<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>野菜のすすめ</title>
    <!-- Google Fonts の読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet">


    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 追加：管理者用ボタン -->
     <button id="admin-login-btn" class="admin-btn">⚙️ 管理者</button>

     <div id="admin-page" class="hidden">
        <div class="detail-header">
            <button id="admin-back-btn">← 戻る</button>
            <h2>管理者用ページ（アクセス解析）</h2>
        </div>
        <div class="admin-content">
            <p class="counter-title">現在の累計アクセス数（PV）</p>
            <img src="moat.moe" alt="Access Counter" class="counter-img">
        </div>
     </div>

    <!-- メイン画面：野菜一覧 -->
    <div id="home-page">
        <header>
            <h1 class="main-title">野菜のすすめ</h1>
        </header>
        <main id="vege-container" class="container"></main>
    </div>

    <!-- 詳細画面：紹介ページ -->
    <div id="detail-page" class="hidden">
        <!-- ヘッダーエリア（ボタンとタイトルをまとめる） -->
        <div class="detail-header">
          <button id="back-btn">← 戻る</button>
          <h2 id="vege-title">野菜の名前</h2>
    </div>
    
    <!-- 画像表示エリア（不必要な入れ子を削除） -->
    <div class="detail-content">
        <img id="img-select" src="" alt="見分け方の画像">
        <p id="ai-credit" class="ai-credit hidden">画像生成: Microsoft Copilot</p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
