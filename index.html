<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>野菜のすすめ</title>
    <!-- Google Fonts の読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- メイン画面：野菜一覧 -->
    <div id="home-page">
        <header>
            <h1 class="main-title">野菜のすすめ</h1>
        </header>
        <main id="vege-container" class="container"></main>
    </div>

    <!-- 詳細画面：紹介ページ -->
    <div id="detail-page" class="hidden">
        <!-- ヘッダーエリア（ボタンとタイトルをまとめる） -->
        <div class="detail-header">
          <button id="back-btn">← 戻る</button>
          <h2 id="vege-title">野菜の名前</h2>
    </div>
    
    <!-- 画像表示エリア（不必要な入れ子を削除） -->
    <div class="detail-content">
        <img id="img-select" src="" alt="見分け方の画像">
    </div>
    
    <script src="script.js"></script>
</body>
</html>
